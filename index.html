<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Лабораторна робота №1 – Варіант 4</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<h1>Posts</h1>

<div class="container">

  <section>
    <h2>Додати запис</h2>

    <form id="postsForm">

      <label for="titleInput">Заголовок</label>
      <input type="text" id="titleInput">
      <div id="titleError" class="error-text"></div>

      <label for="categorySelect">Категорія</label>
      <select id="categorySelect">
        <option value="">Оберіть категорію</option>
        <option value="Новина">Новина</option>
        <option value="Стаття">Стаття</option>
        <option value="Оголошення">Оголошення</option>
      </select>
      <div id="categoryError" class="error-text"></div>

      <label for="bodyInput">Текст</label>
      <textarea id="bodyInput"></textarea>
      <div id="bodyError" class="error-text"></div>

      <label for="authorInput">Автор</label>
      <input type="text" id="authorInput">
      <div id="authorError" class="error-text"></div>

      <button type="submit">Додати</button>
      <button type="button" id="resetBtn">Скасувати</button>

    </form>
  </section>

  <section>
    <h2>Список записів</h2>

    <input type="text" id="searchInput" placeholder="Пошук за заголовком">

    <select id="filterSelect">
      <option value="">Усі категорії</option>
      <option value="Новина">Новина</option>
      <option value="Стаття">Стаття</option>
      <option value="Оголошення">Оголошення</option>
    </select>

    <select id="sortSelect">
      <option value="new">Спочатку нові</option>
      <option value="old">Спочатку старі</option>
    </select>

    <table>
      <thead>
        <tr>
          <th>№</th>
          <th>Заголовок</th>
          <th>Категорія</th>
          <th>Автор</th>
          <th>Текст</th>
          <th>Дата</th>
          <th>Дії</th>
        </tr>
      </thead>
      <tbody id="itemsTableBody"></tbody>
    </table>

  </section>

</div>

<script src="app.js"></script>
</body>
</html>
